# Deploys the static edition to GitHub Pages on every push to main.
# One hosted copy serves unlimited users — each browser keeps its own data.
name: Deploy static edition to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      # The web UI imports shared code from the repo root src/ (see
      # web/src/local.ts), and those root files resolve their own packages
      # (xlsx) from the ROOT node_modules — both installs are required.
      - run: npm ci
      - run: npm ci || npm install
        working-directory: web
      - run: npm run build:static
        working-directory: web
      # NOTE: on a personal (user-owned) repo, GitHub does not allow the
      # workflow's GITHUB_TOKEN to CREATE the Pages site ("Resource not
      # accessible by integration"), so `enablement: true` only helps once
      # Pages already exists. First-time setup is one manual click:
      # Settings → Pages → Source → "GitHub Actions". After that this step
      # always succeeds.
      - uses: actions/configure-pages@v5
        id: pages
        with:
          enablement: true
      - if: failure() && steps.pages.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages is not enabled for this repository, and the workflow token is not allowed to enable it. Fix (one time): open Settings → Pages and set Source to 'GitHub Actions', then re-run this workflow. https://github.com/${{ github.repository }}/settings/pages"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
