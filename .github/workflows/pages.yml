# Deploys the static edition to GitHub Pages on every push to main.
# One hosted copy serves unlimited users — each browser keeps its own data.
name: Deploy static edition to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      # The web UI imports shared code from the repo root src/ (see
      # web/src/local.ts), and those root files resolve their own packages
      # (xlsx) from the ROOT node_modules — both installs are required.
      - run: npm ci
      - run: npm ci || npm install
        working-directory: web
      - run: npm run build:static
        working-directory: web
      # Enables Pages (source: GitHub Actions) on first run so the deploy
      # job works without touching repository settings by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
