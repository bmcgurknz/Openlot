name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  web:
    name: Web — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      # The web UI imports shared code from the repo root src/ (see
      # web/src/local.ts), and those root files resolve their own packages
      # (xlsx) from the ROOT node_modules — both installs are required.
      - run: npm ci
      - run: npm ci || npm install
        working-directory: web
      - run: npm run build
        working-directory: web

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
